name: Football Dashboard

on:
  schedule:
    - cron: "0 7 * * *"
    - cron: "0 14 * * *"
    - cron: "0 21 * * *"
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests

      - name: Correr dashboard
        env:
          BSD_API_KEY: ${{ secrets.BSD_API_KEY }}
          TG_TOKEN:    ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID:  ${{ secrets.TG_CHAT_ID }}
        run: python dashboard.py

      - name: Correr backtest
        env:
          BSD_API_KEY:         ${{ secrets.BSD_API_KEY }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          FORCE_EMAIL:         ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: python backtest.py

      - name: Commit e push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dashboard.html docs/backtest.html docs/history.json docs/trebles.json docs/preds_*.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "update: $(date -u +%Y-%m-%dT%H:%M)"
          git push
