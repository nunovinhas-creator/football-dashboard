name: Football Dashboard

on:
  schedule:
    - cron: "0 7 * * *"   # todos os dias 07:00 UTC (08:00 Lisboa Inverno / 09:00 Verão)
  workflow_dispatch:        # permite correr manualmente pelo botão no GitHub

permissions:
  contents: write           # necessário para o git push do dashboard.html

jobs:
  dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests

      - name: Correr dashboard
        env:
          BSD_API_KEY: ${{ secrets.BSD_API_KEY }}
          TG_TOKEN:    ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID:  ${{ secrets.TG_CHAT_ID }}
        run: python dashboard.py

      - name: Commit e push do dashboard.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dashboard.html
          git diff --staged --quiet || git commit -m "dashboard: $(date -u +%Y-%m-%d)"
          git push
