name: Football Dashboard

on:
  schedule:
    - cron: "0 7 * * *"    # 07:00 UTC — manhã
    - cron: "0 14 * * *"   # 14:00 UTC — tarde
    - cron: "0 21 * * *"   # 21:00 UTC — noite
    - cron: "0 0 * * *"    # 00:00 UTC — meia-noite
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests

      - name: Correr dashboard
        env:
          BSD_API_KEY: ${{ secrets.BSD_API_KEY }}
          TG_TOKEN:    ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID:  ${{ secrets.TG_CHAT_ID }}
        run: python dashboard.py

      - name: Correr backtest
        env:
          BSD_API_KEY: ${{ secrets.BSD_API_KEY }}
        run: python backtest.py

      - name: Commit e push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dashboard.html docs/backtest.html
          git diff --staged --quiet || git commit -m "dashboard+backtest: $(date -u +%Y-%m-%dT%H:%M)"
          git push
