name: Football Dashboard

on:
  push:
    branches: [main]
    paths:
      - "dashboard.py"
      - "backtest.py"
  schedule:
    - cron: "0 7 * * *"    # 07:00 — SAVE + email diário
    - cron: "0 12 * * *"   # 12:00 — SAVE midday (mercados asiáticos abertos)
    - cron: "0 14 * * *"   # 14:00 — SAVE
    - cron: "30 18 * * *"  # 18:30 — SAVE + Telegram antes da janela europeia
    - cron: "0 21 * * *"   # 21:00 — SAVE
    - cron: "0 0 * * *"    # 00:00 — SCORE
  workflow_dispatch:

concurrency:
  group: dashboard
  cancel-in-progress: false

permissions:
  contents: write

# Forçar Node.js 24 para actions/checkout e actions/setup-python
# (Node.js 20 deprecated a partir de June 16, 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fazer checkout do HEAD actual do main, não do SHA do trigger
          # Evita que runs queued partam de um SHA antigo
          ref: main
          fetch-depth: 1

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests

      - name: Correr dashboard
        env:
          BSD_API_KEY: ${{ secrets.BSD_API_KEY }}
          TG_TOKEN:    ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID:  ${{ secrets.TG_CHAT_ID }}
        run: python dashboard.py

      - name: Correr backtest
        env:
          BSD_API_KEY:         ${{ secrets.BSD_API_KEY }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          FORCE_EMAIL:         ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: python backtest.py

      - name: Commit e push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 1. Buscar estado actual do remote (pode ter avançado durante os 5-6 min do run)
          git fetch origin main

          # 2. Soft reset: move HEAD para origin/main sem apagar os ficheiros gerados
          #    (working tree preservado — não há conflito de rebase possível)
          git reset --soft origin/main

          # 3. Proteger dados JSON contra regressão:
          #    Se o remote tem uma versão maior (mais registos/dados), usá-la.
          #    Cenário: run SAVE não modifica history.json, mas um SCORE anterior
          #    pode ter adicionado registos que não existem no nosso working tree.
          for f in docs/history.json docs/trebles.json; do
            [ -f "$f" ] || continue
            LOCAL=$(wc -c < "$f")
            REMOTE=$(git show "origin/main:$f" 2>/dev/null | wc -c || echo 0)
            if [ "$REMOTE" -gt "$LOCAL" ]; then
              echo "Proteger $f: remote ($REMOTE bytes) > local ($LOCAL bytes) — usar versão remota"
              git checkout origin/main -- "$f"
            fi
          done

          # 4. Adicionar todos os ficheiros gerados
          #    HTML: sempre sobrepõe (idempotente — regenerado a cada run)
          #    JSON: versão mais completa (step 3 já garantiu isso)
          git add docs/dashboard.html docs/backtest.html \
                  docs/history.json docs/trebles.json \
                  docs/preds_*.json README.md 2>/dev/null || true

          # 5. Commitar apenas se houver alterações vs. origin/main
          git diff --staged --quiet || git commit -m "update: $(date -u +%Y-%m-%dT%H:%M)"

          # 6. Push directo: HEAD está garantidamente em cima de origin/main (step 2)
          #    Sem rebase, sem conflitos possíveis
          git push
