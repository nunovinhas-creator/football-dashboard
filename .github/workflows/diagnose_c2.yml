name: C2 Diagnóstico Snapshots

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests --quiet

      - name: Correr diagnóstico
        run: python diagnose_snapshots.py | tee docs/diag_c2.txt

      - name: Correr analytics
        run: |
          python mdb_analytics.py > docs/analytics_report.txt || true
          python mdb_analytics.py --oos > docs/analytics_report_oos.txt || true

      - name: Commit resultados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/diag_c2.txt docs/analytics_report.txt docs/analytics_report_oos.txt docs/freeze_manifest.json || true
          git diff --staged --quiet || git commit -m "diag: C2 diagnóstico $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin main
