name: C2 Diagnóstico Snapshots

on:
  workflow_dispatch:   # disparo manual no browser do GitHub

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests pandera pandas --quiet

      - name: Correr diagnóstico
        run: python diagnose_snapshots.py | tee docs/diag_c2.txt

      - name: Correr mdb_analytics (relatório completo)
        env:
          MDB_HISTORY: docs/history.json
        run: |
          python mdb_analytics.py        > docs/analytics_report.txt     || true
          python mdb_analytics.py --oos  > docs/analytics_report_oos.txt || true

      - name: Commit resultados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ || true
          git diff --staged --quiet || \
            git commit -m "diag: C2 diagnóstico snapshots + relatório analytics $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin main
