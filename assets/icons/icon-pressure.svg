<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="PRESSÃO">
  <title>PRESSÃO</title>
  <defs>
    <filter id="rg" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feColorMatrix in="b" type="matrix"
        values="1 0 0 0 1  0 0 0 0 0.2  0 0 0 0 0.2  0 0 0 0.9 0" result="c"/>
      <feMerge><feMergeNode in="c"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Arc gradient: green → gold → red (from low to high pressure) -->
    <linearGradient id="arc-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#39FF14"/>
      <stop offset="50%"  stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#FF3B3B"/>
    </linearGradient>
  </defs>
  <!-- Background disc -->
  <circle cx="24" cy="24" r="23" fill="#1A1C20" stroke="#2A2D33" stroke-width="1.2"/>

  <!-- Gauge arc (semicircle track) -->
  <!-- Track: from 210° to 330° (240° span). r=15, cx=24, cy=26 -->
  <!-- 210°: x = 24 + 15·cos(210°) = 24 - 12.99 = 11.01, y = 26 + 15·sin(210°) = 26 - 7.5 = 18.5 -->
  <!-- 330°: x = 24 + 15·cos(330°) = 24 + 12.99 = 36.99, y = 26 + 15·sin(330°) = 26 - 7.5 = 18.5 -->
  <path d="M10.5 32.5 A15 15 0 1 1 37.5 32.5"
        fill="none" stroke="#2A2D33" stroke-width="5" stroke-linecap="round"/>
  <!-- Colored arc (high-pressure zone — 70% fill) -->
  <path d="M10.5 32.5 A15 15 0 1 1 37.5 32.5"
        fill="none" stroke="url(#arc-grad)" stroke-width="5" stroke-linecap="round"
        stroke-dasharray="47 67" stroke-dashoffset="0"/>

  <!-- Tick marks on arc -->
  <line x1="10" y1="33" x2="13" y2="31" stroke="#2A2D33" stroke-width="1.2"/>
  <line x1="24" y1="11" x2="24" y2="15" stroke="#2A2D33" stroke-width="1.2"/>
  <line x1="38" y1="33" x2="35" y2="31" stroke="#2A2D33" stroke-width="1.2"/>

  <!-- Needle (pointing to high-pressure zone ~75%) -->
  <!-- Needle tip at ~300° from center -->
  <line x1="24" y1="26" x2="35" y2="15" stroke="#FF3B3B" stroke-width="2.2"
        stroke-linecap="round" filter="url(#rg)"/>
  <!-- Needle pivot -->
  <circle cx="24" cy="26" r="3" fill="#2A2D33" stroke="#D4AF37" stroke-width="1.2"/>
  <circle cx="24" cy="26" r="1.5" fill="#D4AF37"/>

  <!-- Label -->
  <text x="24" y="44" font-family="Arial,sans-serif" font-size="6" font-weight="800"
        fill="#D4AF37" text-anchor="middle" letter-spacing="1">PRESSÃO</text>
</svg>
